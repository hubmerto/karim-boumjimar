<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .ink { fill: #111111; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #ffffff; }
    }
  </style>
  <mask id="cut">
    <rect width="32" height="32" fill="white"/>
    <circle cx="20" cy="14" r="12" fill="black"/>
